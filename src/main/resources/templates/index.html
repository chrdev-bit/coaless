<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tasks SPA</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #f9f9f9;
            color: #333;
        }
        h1, h3 { color: #444; }
        .container {
            max-width: 800px;
            margin: auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .task {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 15px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: #fafafa;
        }
        .task input, .task select {
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #ccc;
            width: 100%;
            box-sizing: border-box;
        }
        .task button {
            padding: 6px 12px;
            margin-top: 5px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background: #007bff;
            color: white;
            font-weight: bold;
            transition: background 0.2s;
        }
        .task button:hover { background: #0056b3; }
        #createTask input, #createTask select {
            margin-right: 5px;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
        #createTask button {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            background: #28a745;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        #createTask button:hover { background: #1e7e34; }
        .error { color: red; font-size: 0.85em; margin-top: 2px; }
        .button-group { display: flex; gap: 5px; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Tasks</h1>

    <h3>Add New Task</h3>
    <div id="createTask">
        <input id="newTitle" placeholder="Title">
        <input id="newContent" placeholder="Content">
        <select id="newStatus">
            <option value="TODO">TODO</option>
            <option value="INPROGRESS">INPROGRESS</option>
            <option value="COMPLETED">COMPLETED</option>
        </select>
        <input type="date" id="newDueDate">
        <button onclick="createTask()">Add</button>
        <div id="createError" class="error"></div>
    </div>

    <h3>Existing Tasks</h3>
    <div id="tasks"></div>
</div>

<script>
    async function loadTasks() {
        try {
            const res = await fetch('/api/tasks');
            const data = await res.json();
            const div = document.getElementById('tasks');
            div.innerHTML = '';

            data.forEach(task => {
                const taskDiv = document.createElement('div');
                taskDiv.className = 'task';

                taskDiv.innerHTML = `
                    <input type="text" value="${task.title}" id="title-${task.id}">
                    <input type="text" value="${task.content}" id="content-${task.id}">
                    <select id="status-${task.id}">
                        <option value="TODO" ${task.status === 'TODO' ? 'selected' : ''}>TODO</option>
                        <option value="INPROGRESS" ${task.status === 'INPROGRESS' ? 'selected' : ''}>INPROGRESS</option>
                        <option value="COMPLETED" ${task.status === 'COMPLETED' ? 'selected' : ''}>COMPLETED</option>
                    </select>
                    <input type="date" id="dueDate-${task.id}" value="${task.dueDate}">
                    <div class="button-group">
                        <button onclick="updateTask(${task.id})">Save</button>
                        <button style="background:#dc3545" onclick="deleteTask(${task.id})">Delete</button>
                    </div>
                    <div class="error" id="error-${task.id}"></div>
                `;
                div.appendChild(taskDiv);
            });
        } catch (e) {
            document.getElementById('tasks').innerHTML = '<div class="error">Failed to load tasks</div>';
        }
    }

    async function createTask() {
        const title = document.getElementById('newTitle').value;
        const content = document.getElementById('newContent').value;
        const status = document.getElementById('newStatus').value;
        const dueDate = document.getElementById('newDueDate').value;
        const errorDiv = document.getElementById('createError');
        errorDiv.textContent = '';

        try {
            const res = await fetch('/api/tasks', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({title, content, status, dueDate})
            });

            const data = await res.json();
            if (!res.ok) {
                errorDiv.textContent = data.error || 'Error creating task';
            } else {
                document.getElementById('newTitle').value = '';
                document.getElementById('newContent').value = '';
                document.getElementById('newDueDate').value = '';
                loadTasks();
            }
        } catch (e) {
            errorDiv.textContent = 'Network error';
        }
    }

    async function updateTask(id) {
        const title = document.getElementById('title-' + id).value;
        const content = document.getElementById('content-' + id).value;
        const status = document.getElementById('status-' + id).value;
        const dueDate = document.getElementById('dueDate-' + id).value;
        const errorDiv = document.getElementById('error-' + id);
        errorDiv.textContent = '';

        try {
            const res = await fetch('/api/tasks/' + id, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({title, content, status, dueDate})
            });

            const data = await res.json();
            if (!res.ok) {
                errorDiv.textContent = data.error || 'Error updating task';
            } else {
                loadTasks();
            }
        } catch (e) {
            errorDiv.textContent = 'Network error';
        }
    }

    async function deleteTask(id) {
        const errorDiv = document.getElementById('error-' + id);
        errorDiv.textContent = '';

        try {
            const res = await fetch('/api/tasks/' + id, { method: 'DELETE' });
            if (!res.ok) {
                const data = await res.json();
                errorDiv.textContent = data.error || 'Error deleting task';
            } else {
                loadTasks();
            }
        } catch (e) {
            errorDiv.textContent = 'Network error';
        }
    }

    loadTasks();
</script>

</body>
</html>
